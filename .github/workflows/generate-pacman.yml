name: Generate Pac-Man Contribution Graph

on:
  schedule:
    - cron: '0 18 * * 0' # 매주 일요일 (한국시간 월요일 오전 3시)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: kss2002
          outputs: |
            .github/images/github-contribution-grid-pacman.svg?type=pacman
            .github/images/github-contribution-grid-pacman-dark.svg?palette=github-dark&type=pacman
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          git commit -m "🟡 Update Pac-Man contribution graph" || echo "No changes to commit"
          git push
