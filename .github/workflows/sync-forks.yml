name: Sync all forks

on:
  schedule:
    - cron: '0 0 * * *'   # ⑍일 UTC 00:00 (한국시간 오전 9시)
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync all my forks
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          set -e
          echo "Fetching list of forks..."
          # 내 계정의 레포 중 fork인 것만 자동으로 추출 (source 아닌 것 제외)
          gh api --paginate "user/repos?type=owner&per_page=100" \
            --jq '.[] | select(.fork == true) | .full_name' > forks.txt
          echo "Found $(wc -l < forks.txt) forks:"
          cat forks.txt
          echo "-----------------------------"
          while IFS= read -r repo; do
            [ -z "$repo" ] && continue
            echo "Syncing $repo ..."
            gh repo sync "$repo" || echo "WARNING: $repo sync failed (머지 충돌 가능성)"
          done < forks.txt
          echo "Done."
