name: Sync all forks

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync all my forks
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          # Owners/orgs to skip entirely (space separated)
          EXCLUDE_OWNERS: "9oormthon-univ"
        run: |
          echo "Fetching list of forks..."
          gh api --paginate "user/repos?type=owner&per_page=100" \
            --jq '.[] | select(.fork == true) | .full_name' > forks.txt
          echo "Found $(wc -l < forks.txt) forks total."
          echo "-----------------------------"

          synced=0
          skipped=0
          failed=0
          skipped_list=""
          failed_list=""

          while IFS= read -r repo; do
            [ -z "$repo" ] && continue

            # Determine the parent (upstream) owner to check exclusions
            parent=$(gh api "repos/$repo" --jq '.parent.full_name' 2>/dev/null || echo "")
            parent_owner="${parent%%/*}"

            skip=0
            for ex in $EXCLUDE_OWNERS; do
              if [ "$parent_owner" = "$ex" ]; then skip=1; fi
            done

            if [ "$skip" = "1" ]; then
              echo "SKIP: $repo (upstream owner $parent_owner excluded)"
              skipped=$((skipped+1))
              skipped_list="$skipped_list $repo"
              continue
            fi

            echo "::group::Syncing $repo (upstream: ${parent:-unknown})"
            if git clone --quiet "https://x-access-token:${GH_TOKEN}@github.com/$repo.git" repo_tmp; then
              cd repo_tmp
              default_branch=$(git symbolic-ref --short HEAD)
              upstream_url="https://x-access-token:${GH_TOKEN}@github.com/$parent.git"
              git remote add upstream "$upstream_url" 2>/dev/null || git remote set-url upstream "$upstream_url"
              if git fetch --quiet upstream "$default_branch" \
                && git merge --ff-only "upstream/$default_branch" \
                && git push --quiet origin "$default_branch"; then
                echo "OK: $repo synced ($default_branch)"
                synced=$((synced+1))
              else
                echo "WARNING: $repo could not fast-forward (diverged or push denied)"
                failed=$((failed+1))
                failed_list="$failed_list $repo"
              fi
              cd ..
              rm -rf repo_tmp
            else
              echo "WARNING: $repo clone failed (access denied?)"
              failed=$((failed+1))
              failed_list="$failed_list $repo"
            fi
            echo "::endgroup::"
          done < forks.txt

          echo "-----------------------------"
          echo "Done. synced=$synced skipped=$skipped failed=$failed"
          [ -n "$skipped_list" ] && echo "Skipped repos:$skipped_list"
          [ -n "$failed_list" ] && echo "Failed repos:$failed_list"
