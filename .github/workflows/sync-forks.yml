name: Sync all forks

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

# Prevent overlapping runs (e.g. schedule + manual)
concurrency:
  group: sync-forks
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Sync all my forks
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          # Upstream owners/orgs to skip entirely (space separated)
          EXCLUDE_OWNERS: "9oormthon-univ"
        run: |
          set -uo pipefail

          echo "Fetching list of forks..."
          gh api --paginate "user/repos?type=owner&per_page=100" \
            --jq '.[] | select(.fork == true) | .full_name' > forks.txt
          total=$(grep -c . forks.txt || true)
          echo "Found $total forks total."
          echo "-----------------------------"

          synced=0
          skipped=0
          failed=0
          skipped_list=""
          failed_list=""

          while IFS= read -r repo; do
            [ -z "$repo" ] && continue

            # Look up the upstream (parent) to decide exclusions
            parent=$(gh api "repos/$repo" --jq '.parent.full_name // ""' 2>/dev/null || echo "")
            parent_owner="${parent%%/*}"

            skip=0
            for ex in $EXCLUDE_OWNERS; do
              [ "$parent_owner" = "$ex" ] && skip=1
            done

            if [ "$skip" = "1" ]; then
              echo "SKIP  $repo (upstream $parent excluded)"
              skipped=$((skipped+1))
              skipped_list="$skipped_list $repo"
              continue
            fi

            # Server-side sync via the merge-upstream API (no cloning, near-instant).
            # 'gh repo sync' fast-forwards the fork's default branch to its upstream.
            if out=$(gh repo sync "$repo" 2>&1); then
              echo "OK    $repo  ($out)"
              synced=$((synced+1))
            else
              echo "FAIL  $repo  -> $out"
              failed=$((failed+1))
              failed_list="$failed_list $repo"
            fi
          done < forks.txt

          echo "-----------------------------"
          echo "Summary: synced=$synced  skipped=$skipped  failed=$failed  (total=$total)"
          [ -n "$skipped_list" ] && echo "Skipped:$skipped_list"
          [ -n "$failed_list" ]  && echo "Failed: $failed_list"

          # Fail the job only if something we actually attempted failed.
          if [ "$failed" -gt 0 ]; then
            echo "::warning::$failed fork(s) failed to sync"
          fi
          exit 0
