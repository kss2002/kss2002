name: Sync all forks

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync all my forks
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          echo "Fetching list of forks..."
          gh api --paginate "user/repos?type=owner&per_page=100" \
            --jq '.[] | select(.fork == true) | .full_name' > forks.txt
          echo "Found $(wc -l < forks.txt) forks:"
          cat forks.txt
          echo "-----------------------------"
          success=0
          failed=0
          failed_list=""
          while IFS= read -r repo; do
            [ -z "$repo" ] && continue
            echo "::group::Syncing $repo"
            if gh repo sync "$repo"; then
              echo "OK: $repo synced"
              success=$((success+1))
            else
              echo "WARNING: $repo sync failed (merge conflict or access denied)"
              failed=$((failed+1))
              failed_list="$failed_list $repo"
            fi
            echo "::endgroup::"
          done < forks.txt
          echo "-----------------------------"
          echo "Done. success=$success failed=$failed"
          if [ -n "$failed_list" ]; then
            echo "Failed repos:$failed_list"
          fi
