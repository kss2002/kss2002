name: 기능 요청
description: 새로운 기능이나 개선 사항을 제안해주세요.
title: '[FEAT] '
labels: ['enhancement']
assignees:
  - kss2002

body:
  - type: markdown
    attributes:
      value: |
        좋은 아이디어를 공유해주셔서 감사합니다! 아래 항목을 최대한 자세히 작성해주세요.

  - type: textarea
    id: problem
    attributes:
      label: 관련된 문제
      description: 제안하는 기능이 어떤 문제와 관련이 있나요?
      placeholder: "예시: '...'할 때 항상 불편함을 느낍니다."

  - type: textarea
    id: solution
    attributes:
      label: 원하는 해결책
      description: 어떤 기능이 추가되거나 개선되기를 원하시나요?
      placeholder: 원하는 해결책에 대한 명확하고 간결한 설명을 작성해주세요.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 고려한 대안
      description: 고려한 다른 해결책이나 기능이 있나요?
      placeholder: 대안적인 방법이 있다면 설명해주세요.

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      description: 이 기능이 얼마나 중요한가요?
      options:
        - 낮음 (있으면 좋겠지만 급하지 않음)
        - 보통 (개선이 필요함)
        - 높음 (중요한 기능)
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 추가 정보
      description: 기능 요청과 관련된 스크린샷, 참고 링크 등 추가 정보를 입력해주세요.
      placeholder: 참고 자료나 스크린샷을 첨부해주세요.
